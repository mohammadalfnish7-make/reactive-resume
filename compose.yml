name: reactive_resume

services:
  postgres:
    image: postgres:latest
    restart: unless-stopped
    networks:
      - reactive_resume_network
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "postgres"]
      start_period: 10s
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    restart: unless-stopped
    command: redis-server --appendonly yes
    networks:
      - reactive_resume_network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 5s
      interval: 30s
      timeout: 10s
      retries: 3

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: server -s3 -filer -dir=/data -ip=0.0.0.0
    networks:
      - reactive_resume_network
    environment:
      AWS_ACCESS_KEY_ID: seaweedfs
      AWS_SECRET_ACCESS_KEY: seaweedfs
    volumes:
      - seaweedfs_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8888"]
      start_period: 10s
      interval: 30s
      timeout: 10s
      retries: 3

  seaweedfs_create_bucket:
    image: quay.io/minio/mc:latest
    restart: on-failure
    networks:
      - reactive_resume_network
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        mc alias set seaweedfs http://seaweedfs:8333 seaweedfs seaweedfs;
        mc mb --ignore-existing seaweedfs/reactive-resume;
        exit 0;
      "
    depends_on:
      seaweedfs:
        condition: service_healthy

  reactive_resume:
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - reactive_resume_network
    environment:
      APP_URL: ${COOLIFY_URL:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/postgres}
      AUTH_SECRET: ${AUTH_SECRET}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-seaweedfs}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-seaweedfs}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://seaweedfs:8333}
      S3_BUCKET: ${S3_BUCKET:-reactive-resume}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      PORT: ${PORT:-3000}
      TZ: ${TZ:-Etc/UTC}
      FLAG_DISABLE_SIGNUPS: ${FLAG_DISABLE_SIGNUPS:-false}
      FLAG_DISABLE_EMAIL_AUTH: ${FLAG_DISABLE_EMAIL_AUTH:-false}
      FLAG_DISABLE_IMAGE_PROCESSING: ${FLAG_DISABLE_IMAGE_PROCESSING:-false}
      FLAG_DISABLE_API_RATE_LIMIT: ${FLAG_DISABLE_API_RATE_LIMIT:-false}
      FLAG_SHOW_SPONSORS: ${FLAG_SHOW_SPONSORS:-false}
    volumes:
      - reactive_resume_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      seaweedfs_create_bucket:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((r) => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1));"]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  seaweedfs_data:
  reactive_resume_data:

networks:
  reactive_resume_network:
    driver: bridge
